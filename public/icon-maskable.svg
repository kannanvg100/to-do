<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A020"/>
      <stop offset="100%" stop-color="#9A6210"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (no rx — maskable icons get clipped by the OS) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Notebook ruling lines — kept within the 80% safe-zone circle (~r=205, centre 256,256) -->
  <line x1="148" y1="204" x2="364" y2="204" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.2"/>
  <line x1="148" y1="244" x2="364" y2="244" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.2"/>
  <line x1="148" y1="284" x2="364" y2="284" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.2"/>
  <line x1="148" y1="324" x2="364" y2="324" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.2"/>

  <!-- Margin line -->
  <line x1="180" y1="148" x2="180" y2="364" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.28"/>

  <!-- Bold checkmark — fully within safe zone -->
  <path d="M192 272 L252 332 L356 180"
        stroke="white"
        stroke-width="50"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
