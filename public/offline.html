<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C8921A" />
    <title>Offline | To-Do</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --ink: #2A2723;
        --ink-soft: #6E685D;
        --ink-faint: #B0A795;
        --paper-1: #FBF5E5;
        --paper-2: #F5EDD7;
        --rule: #D9C99B;
        --margin: #C76D5A;
        --accent-deep: #8C6B14;
        --shadow: rgba(60, 50, 30, 0.18);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #E8DFC4;
        color: var(--ink);
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      }

      body::before {
        content: '';
        position: fixed; inset: 0;
        background:
          radial-gradient(ellipse at 30% 20%, #F0E6CC, transparent 60%),
          radial-gradient(ellipse at 70% 80%, #DCD0B0, transparent 60%),
          #E5DBBE;
        z-index: -1;
      }

      .card {
        width: min(26rem, calc(100vw - 2.5rem));
        background: linear-gradient(180deg, var(--paper-1) 0%, var(--paper-2) 100%);
        border-radius: 6px 14px 14px 6px;
        box-shadow:
          0 1px 2px rgba(0,0,0,0.05),
          0 12px 28px var(--shadow),
          0 32px 60px rgba(60,50,30,0.10),
          inset 0 0 0 1px rgba(120,90,40,0.08);
        overflow: hidden;
        position: relative;
      }

      /* Binding shadow */
      .card::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 38px;
        background: linear-gradient(90deg, rgba(0,0,0,0.05), transparent 70%);
        z-index: 1;
        pointer-events: none;
      }

      /* Margin line */
      .card::after {
        content: '';
        position: absolute;
        left: 52px; top: 0; bottom: 0;
        border-left: 1.5px solid var(--margin);
        opacity: 0.5;
        z-index: 2;
        pointer-events: none;
      }

      .inner {
        position: relative;
        z-index: 3;
        padding: 40px 44px 44px 72px;
      }

      .stamp {
        display: inline-block;
        padding: 3px 9px;
        border: 1.5px solid var(--margin);
        color: var(--margin);
        border-radius: 3px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        transform: rotate(-2deg);
        margin-bottom: 16px;
        opacity: 0.85;
      }

      h1 {
        font-family: 'Caveat', cursive;
        font-size: 2.6rem;
        font-weight: 700;
        line-height: 1;
        margin: 0 0 16px;
        color: var(--ink);
      }

      .rule-line {
        border: none;
        border-top: 1px solid var(--rule);
        margin: 0 0 16px;
      }

      p {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--ink-soft);
      }

      .holes {
        position: absolute;
        left: 16px; top: 36px;
        display: flex;
        flex-direction: column;
        gap: 56px;
        z-index: 4;
      }

      .hole {
        width: 12px; height: 12px;
        border-radius: 50%;
        background: #C9BC97;
        box-shadow:
          inset 0 1px 2px rgba(0,0,0,0.35),
          inset 0 -1px 1px rgba(255,255,255,0.4),
          0 1px 0 rgba(255,255,255,0.5);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="holes">
        <div class="hole"></div>
        <div class="hole"></div>
        <div class="hole"></div>
      </div>
      <div class="inner">
        <div class="stamp">Offline</div>
        <h1>No connection</h1>
        <hr class="rule-line" />
        <p>To-Do will reconnect automatically when your network is back. Any changes you make may not save until then.</p>
      </div>
    </div>
  </body>
</html>
