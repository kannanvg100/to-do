<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#863bff" />
    <title>Offline | To-Do</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fafafa 0%, #f1f5f9 100%);
        color: #18181b;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid #e4e4e7;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.92);
        padding: 1.5rem;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #52525b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>To-Do will reconnect automatically when your network comes back.</p>
    </main>
  </body>
  </html>
